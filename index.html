<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Leveling DSA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --surface: #0a0f1e;
  --surface2: #0f1628;
  --border: #1a2540;
  --border2: #243060;
  --accent: #00d4ff;
  --accent2: #7b2fff;
  --gold: #ffd700;
  --gold2: #ff9500;
  --red: #ff3b5c;
  --green: #00ff88;
  --text: #e8eaf6;
  --text2: #8892b0;
  --text3: #4a5580;
  --rank-e: #888;
  --rank-d: #4fc3f7;
  --rank-c: #81c784;
  --rank-b: #ff8a65;
  --rank-a: #ce93d8;
  --rank-s: #ffd700;
  --rank-n: #ff3b5c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(123,47,255,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.grid-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}
.header-title {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(0,212,255,0.4);
}
.header-sub { font-size: 12px; color: var(--text2); font-family: 'Share Tech Mono', monospace; }

/* RANK BADGE */
.rank-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 22px;
  text-align: center;
  transition: all 0.3s;
}
.rank-badge span { font-size: 10px; font-family: 'Share Tech Mono'; font-weight: 400; }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card.xp::before { background: var(--accent); }
.stat-card.streak::before { background: var(--gold); }
.stat-card.day::before { background: var(--accent2); }
.stat-card.miss::before { background: var(--red); }

.stat-label { font-size: 10px; color: var(--text2); font-family: 'Share Tech Mono'; letter-spacing: 1px; }
.stat-value { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; margin-top: 2px; }
.stat-card.xp .stat-value { color: var(--accent); }
.stat-card.streak .stat-value { color: var(--gold); }
.stat-card.day .stat-value { color: var(--accent2); }
.stat-card.miss .stat-value { color: var(--red); }

/* XP BAR */
.xp-bar-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
}
.xp-bar-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
.xp-bar-labels span { font-size: 11px; font-family: 'Share Tech Mono'; color: var(--text2); }
.xp-bar-bg {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.xp-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transition: width 0.6s ease;
  box-shadow: 0 0 10px rgba(0,212,255,0.4);
}

/* NOTIFICATION */
.notif {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-family: 'Share Tech Mono';
  font-size: 13px;
  display: none;
  border-left: 3px solid;
  position: relative;
}
.notif.danger { background: rgba(255,59,92,0.1); border-color: var(--red); color: #ff8099; }
.notif.warning { background: rgba(255,165,0,0.1); border-color: var(--gold2); color: #ffb347; }
.notif.success { background: rgba(0,255,136,0.1); border-color: var(--green); color: #00ff88; }
.notif.info { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }
.notif.show { display: block; }

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.tab {
  padding: 8px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: 'Share Tech Mono';
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.tab.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.08);
}
.tab:hover:not(.active) { border-color: var(--border2); color: var(--text); }

/* DAY CARD */
.day-section { display: none; }
.day-section.active { display: block; }

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.day-card.completed { border-color: rgba(0,255,136,0.3); }
.day-card.completed::after {
  content: 'COMPLETE';
  position: absolute;
  top: 14px; right: 16px;
  font-family: 'Share Tech Mono';
  font-size: 10px;
  color: var(--green);
  border: 1px solid var(--green);
  padding: 2px 8px;
  border-radius: 4px;
}
.day-card.today { border-color: var(--accent); }
.day-card.today::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}
.day-card.revision { border-color: rgba(123,47,255,0.4); }
.day-card.missed { border-color: rgba(255,59,92,0.3); }

.day-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.day-num {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  color: var(--accent);
  min-width: 60px;
}
.day-focus {
  font-family: 'Share Tech Mono';
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.day-xp-preview {
  margin-left: auto;
  font-family: 'Share Tech Mono';
  font-size: 12px;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* TASKS */
.tasks { display: flex; flex-direction: column; gap: 8px; }
.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
  transition: all 0.15s;
  user-select: none;
  flex-wrap: wrap;
}
.task-row.solo   { background: rgba(0,255,136,0.04); border-color: rgba(0,255,136,0.25); }
.task-row.hint   { background: rgba(0,212,255,0.04); border-color: rgba(0,212,255,0.22); }
.task-row.ai     { background: rgba(255,165,0,0.04); border-color: rgba(255,149,0,0.25); }
.task-row.copied { background: rgba(255,59,92,0.04); border-color: rgba(255,59,92,0.25); }

.task-top { display: flex; align-items: center; gap: 10px; width: 100%; }
.task-label { font-size: 14px; color: var(--text); flex: 1; }
.task-type-badge {
  font-family: 'Share Tech Mono'; font-size: 10px; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 3px; border: 1px solid; flex-shrink: 0;
}
.task-xp { font-family: 'Share Tech Mono'; font-size: 12px; font-weight: 700; flex-shrink: 0; }

/* integrity selector buttons */
.integrity-row {
  display: flex; gap: 6px; width: 100%; margin-top: 6px; flex-wrap: wrap;
}
.integrity-btn {
  flex: 1; min-width: 70px;
  padding: 5px 4px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-family: 'Share Tech Mono';
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}
.integrity-btn:hover { background: var(--surface); }
.integrity-btn.active-solo   { border-color: var(--green);  color: var(--green);  background: rgba(0,255,136,0.08); }
.integrity-btn.active-hint   { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
.integrity-btn.active-ai     { border-color: var(--gold2);  color: var(--gold2);  background: rgba(255,149,0,0.08); }
.integrity-btn.active-copied { border-color: var(--red);    color: var(--red);    background: rgba(255,59,92,0.08); }

/* COMPLETE DAY BTN */
.complete-day-btn {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: rgba(0,212,255,0.08);
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.complete-day-btn:hover { background: rgba(0,212,255,0.15); }
.complete-day-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.complete-day-btn.done-btn {
  background: rgba(0,255,136,0.08);
  border-color: var(--green);
  color: var(--green);
  cursor: default;
}

/* SCHEDULE VIEW */
.schedule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.mini-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.mini-day:hover { border-color: var(--border2); }
.mini-day.done-mini { border-color: rgba(0,255,136,0.25); background: rgba(0,255,136,0.04); }
.mini-day.today-mini { border-color: var(--accent); }
.mini-day.missed-mini { border-color: rgba(255,59,92,0.25); }
.mini-day.rev-mini { border-color: rgba(123,47,255,0.3); }
.mini-day-num { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--text2); }
.mini-day-focus { font-size: 11px; color: var(--text); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-day-status { font-size: 10px; margin-top: 4px; font-family: 'Share Tech Mono'; }
.mini-day.done-mini .mini-day-status { color: var(--green); }
.mini-day.today-mini .mini-day-status { color: var(--accent); }
.mini-day.missed-mini .mini-day-status { color: var(--red); }

/* REWARDS */
.rewards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.reward-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
}
.reward-card.unlocked { border-color: rgba(255,215,0,0.4); }
.reward-icon { font-size: 24px; margin-bottom: 8px; }
.reward-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.reward-req { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text2); }
.reward-status {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; font-family: 'Share Tech Mono';
  padding: 2px 8px; border-radius: 4px;
}
.reward-card.unlocked .reward-status { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
.reward-card:not(.unlocked) .reward-status { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border); }

/* RULES */
.rules-section { display: flex; flex-direction: column; gap: 10px; }
.rule-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.rule-group-title {
  font-family: 'Share Tech Mono';
  font-size: 12px;
  letter-spacing: 2px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.rule-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.rule-row:last-child { border-bottom: none; }
.rule-row .rule-xp { font-family: 'Share Tech Mono'; font-size: 12px; font-weight: 600; }
.rule-xp.pos { color: var(--green); }
.rule-xp.neg { color: var(--red); }
.rule-xp.bonus { color: var(--gold); }

/* RANKS TABLE */
.ranks-table { width: 100%; border-collapse: collapse; }
.ranks-table td, .ranks-table th {
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.ranks-table th { font-family: 'Share Tech Mono'; font-size: 11px; color: var(--text2); letter-spacing: 1px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 18px;
  font-family: 'Share Tech Mono';
  font-size: 13px;
  z-index: 100;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
  max-width: 300px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.xp-toast { border-color: var(--gold); color: var(--gold); }
.toast.danger-toast { border-color: var(--red); color: var(--red); }
.toast.success-toast { border-color: var(--green); color: var(--green); }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 24px;
  max-width: 420px;
  width: 100%;
  position: relative;
}
.modal-title {
  font-family: 'Orbitron', monospace;
  font-size: 16px;
  color: var(--accent);
  margin-bottom: 12px;
}
.modal-body { color: var(--text2); font-size: 14px; line-height: 1.7; margin-bottom: 18px; }
.modal-body strong { color: var(--red); }
.modal-btns { display: flex; gap: 10px; }
.modal-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid;
  font-family: 'Share Tech Mono';
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-btn.confirm { border-color: var(--red); color: var(--red); background: rgba(255,59,92,0.08); }
.modal-btn.confirm:hover { background: rgba(255,59,92,0.15); }
.modal-btn.cancel { border-color: var(--border2); color: var(--text2); background: transparent; }
.modal-btn.cancel:hover { background: var(--surface2); }

/* SECTION HEADER */
.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .header-title { font-size: 14px; }
  .rewards-grid { grid-template-columns: 1fr; }
  .schedule-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
}

.start-day-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, rgba(123,47,255,0.15), rgba(0,212,255,0.15));
  border: 1px solid var(--accent);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Orbitron', monospace;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 3px;
  cursor: pointer;
  margin-bottom: 16px;
  transition: all 0.2s;
}
.start-day-btn:hover { background: linear-gradient(135deg, rgba(123,47,255,0.25), rgba(0,212,255,0.25)); }

.penalty-info {
  background: rgba(255,59,92,0.06);
  border: 1px solid rgba(255,59,92,0.2);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 14px;
  font-family: 'Share Tech Mono';
  font-size: 12px;
  color: #ff8099;
  display: none;
}
.penalty-info.show { display: block; }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div>
    <div class="header-title">SOLO LEVELING DSA</div>
    <div class="header-sub">180-DAY SYSTEM &bull; PYTHON MASTER PLAN</div>
  </div>
  <div id="rankBadge" class="rank-badge"></div>
</div>

<!-- NOTIFICATIONS (penalty etc) -->
<div id="notif" class="notif"></div>
<div id="penaltyInfo" class="penalty-info"></div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card xp">
    <div class="stat-label">TOTAL XP</div>
    <div class="stat-value" id="totalXp">0</div>
  </div>
  <div class="stat-card streak">
    <div class="stat-label">STREAK</div>
    <div class="stat-value" id="streak">0🔥</div>
  </div>
  <div class="stat-card day">
    <div class="stat-label">CURRENT DAY</div>
    <div class="stat-value" id="currentDay">1</div>
  </div>
  <div class="stat-card miss">
    <div class="stat-label">DAYS MISSED</div>
    <div class="stat-value" id="daysMissed">0</div>
  </div>
</div>

<!-- XP BAR -->
<div class="xp-bar-wrap">
  <div class="xp-bar-labels">
    <span id="xpBarLabel">E RANK → D RANK</span>
    <span id="xpBarPct">0%</span>
  </div>
  <div class="xp-bar-bg">
    <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">TODAY</div>
  <div class="tab" onclick="switchTab('schedule')">SCHEDULE</div>
  <div class="tab" onclick="switchTab('rewards')">REWARDS</div>
  <div class="tab" onclick="switchTab('rules')">RULES</div>
</div>

<!-- TODAY TAB -->
<div id="tab-today" class="day-section active">
  <div id="todayContent"></div>
</div>

<!-- SCHEDULE TAB -->
<div id="tab-schedule" class="day-section">
  <div class="section-title">ALL 180 DAYS</div>
  <div class="schedule-grid" id="scheduleGrid"></div>
</div>

<!-- REWARDS TAB -->
<div id="tab-rewards" class="day-section">
  <div class="section-title">STREAK REWARDS</div>
  <div class="rewards-grid" id="rewardsGrid"></div>
  <br>
  <div class="section-title">SPECIAL MISSIONS</div>
  <div class="rules-section" id="specialMissions"></div>
</div>

<!-- RULES TAB -->
<div id="tab-rules" class="day-section">
  <div class="section-title">SYSTEM RULES</div>
  <div class="rules-section" id="rulesContent"></div>
</div>

</div><!-- .app -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">SYSTEM ALERT</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-btns">
      <button class="modal-btn confirm" id="modalConfirm">CONFIRM</button>
      <button class="modal-btn cancel" onclick="closeModal()">CANCEL</button>
    </div>
  </div>
</div>

<script>
// ========== DATA ==========

const SCHEDULE = [

// Base XP per task slot: [learn, easy1, easy2, medium]
const TASK_XP      = {0:20, 1:15, 2:15, 3:30};
const REVISION_XP  = {0:20, 1:20, 2:20, 3:20};
const PERFECT_BONUS = 40;
const TRACKER_XP = 10;

// Integrity modes: null=untouched, 'solo','hint','ai','copied'
// XP multipliers
const INTEGRITY = {
  solo:   { mult:1.0,  label:'SOLO',       desc:'Full XP — Solved yourself',           color:'var(--green)',  badge:'✓ SOLO' },
  hint:   { mult:0.5,  label:'HINT',       desc:'50% XP — Needed a nudge',             color:'var(--accent)', badge:'~ HINT' },
  ai:     { mult:0.33, label:'AI HELP',    desc:'33% XP — AI explained, you understood',color:'var(--gold2)',  badge:'! AI'   },
  copied: { mult:0,    label:'COPIED',     desc:'0 XP  — Penalty: -30 XP cheating',    color:'var(--red)',    badge:'✗ COPY' }
};

function getBaseXp(dayData, i) {
  return dayData.isRevision ? REVISION_XP[i] : TASK_XP[i];
}

function calcTaskXp(dayData, i, mode) {
  if (!mode) return 0;
  const base = getBaseXp(dayData, i);
  if (mode === 'copied') return -30; // penalty
  return Math.round(base * INTEGRITY[mode].mult);
}

function allTasksDone(modes) {
  return modes.every(m => m !== null);
}

function isPerfectDay(modes) {
  return modes.every(m => m === 'solo');
}

  {name:"A", min:7000, max:12000, color:"#ce93d8"},
  {name:"S", min:12000, max:18000, color:"#ffd700"},
  {name:"NATIONAL", min:18000, max:999999, color:"#ff3b5c"}
];

const REWARDS = [
  {streak:7, title:"Movie Night", desc:"Watch a movie guilt-free", icon:"🎬"},
  {streak:14, title:"Favorite Food", desc:"Treat yourself to your favorite meal", icon:"🍔"},
  {streak:30, title:"Buy Something", desc:"Buy a small item you've been wanting", icon:"🛍️"},
  {streak:60, title:"New Headphones", desc:"New headphones or a big gift to yourself", icon:"🎧"},
  {streak:100, title:"Celebration Day", desc:"Full celebration — you earned it", icon:"🏆"}
];

// ========== STATE ==========

function loadState() {
  const d = localStorage.getItem('dsa_state');
  if (d) return JSON.parse(d);
  return {
    startDate: null,
    currentDay: 1,
    xp: 0,
    streak: 0,
    maxStreak: 0,
    daysMissed: 0,
    lastActivityDate: null,
    completedDays: {},  // {day: {modes:['solo'|'hint'|'ai'|'copied'|null,...], xp, date, trackerUpdated}}
    pendingPenalty: null
  };
}

function saveState(s) {
  localStorage.setItem('dsa_state', JSON.stringify(s));
}

let state = loadState();
let pendingModes = {}; // {dayNum: [mode,mode,mode,mode]} — null = untouched

// ========== DATE HELPERS ==========

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function daysSince(dateStr) {
  if (!dateStr) return 0;
  const d1 = new Date(dateStr);
  const d2 = new Date(todayStr());
  return Math.round((d2 - d1) / 86400000);
}

// ========== STARTUP PENALTY CHECK ==========

function checkMissedDays() {
  if (!state.startDate) return;
  const today = todayStr();
  if (state.lastActivityDate === today) return; // already logged today

  const dayNum = state.currentDay;
  const lastActive = state.lastActivityDate;
  if (!lastActive) return;

  const missed = daysSince(lastActive) - 1; // days between last active and today
  if (missed <= 0) return;

  let xpPenalty = 0;
  let extra = 0;
  let msg = '';

  if (missed === 1) {
    xpPenalty = 10;
    msg = `⚠️ YOU MISSED 1 DAY — PENALTY: -10 XP`;
  } else if (missed === 2) {
    xpPenalty = 50;
    extra = 2;
    msg = `⚠️ YOU MISSED 2 DAYS — PENALTY: -50 XP + 2 EXTRA PROBLEMS`;
  } else {
    xpPenalty = 50 + (missed-2)*30;
    extra = 2 + (missed-2);
    msg = `⚠️ YOU MISSED ${missed} DAYS — PENALTY: -${xpPenalty} XP + ${extra} EXTRA PROBLEMS + NO ENTERTAINMENT 24HRS`;
  }

  state.xp = Math.max(0, state.xp - xpPenalty);
  state.streak = 0;
  state.daysMissed += missed;

  // advance current day by missed days
  for (let i = 0; i < missed; i++) {
    const d = state.currentDay;
    if (!state.completedDays[d]) {
      state.completedDays[d] = {modes:[null,null,null,null], xp:0, date:null, missed:true};
    }
    if (state.currentDay < 180) state.currentDay++;
  }

  saveState(state);

  const notif = document.getElementById('notif');
  notif.className = 'notif danger show';
  notif.textContent = msg;

  if (extra > 0) {
    const pi = document.getElementById('penaltyInfo');
    pi.className = 'penalty-info show';
    pi.textContent = `PENALTY QUEST: Solve ${extra} extra problems today before starting your regular tasks.`;
  }
}

// ========== RANK ==========

function getRank(xp) {
  for (let i = RANKS.length-1; i >= 0; i--) {
    if (xp >= RANKS[i].min) return RANKS[i];
  }
  return RANKS[0];
}

function updateRankBadge() {
  const r = getRank(state.xp);
  const badge = document.getElementById('rankBadge');
  badge.style.color = r.color;
  badge.style.borderColor = r.color;
  badge.style.boxShadow = `0 0 12px ${r.color}33`;
  badge.innerHTML = `${r.name}<span>RANK</span>`;
}

function updateXpBar() {
  const r = getRank(state.xp);
  const idx = RANKS.indexOf(r);
  let pct = 100;
  let label = 'MAX RANK';
  if (idx < RANKS.length - 1) {
    const next = RANKS[idx+1];
    pct = Math.round(((state.xp - r.min) / (next.min - r.min)) * 100);
    label = `${r.name} RANK → ${next.name} RANK`;
  }
  document.getElementById('xpBarFill').style.width = pct + '%';
  document.getElementById('xpBarLabel').textContent = label;
  document.getElementById('xpBarPct').textContent = pct + '%';
}

function updateStats() {
  document.getElementById('totalXp').textContent = state.xp.toLocaleString();
  document.getElementById('streak').textContent = state.streak + '🔥';
  document.getElementById('currentDay').textContent = state.currentDay;
  document.getElementById('daysMissed').textContent = state.daysMissed;
  updateRankBadge();
  updateXpBar();
}

// ========== TODAY TAB ==========

function renderToday() {
  const container = document.getElementById('todayContent');

  if (!state.startDate) {
    container.innerHTML = `
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-family:'Orbitron',monospace;font-size:20px;color:var(--accent);margin-bottom:12px;">WELCOME, HUNTER</div>
        <div style="color:var(--text2);margin-bottom:24px;font-family:'Share Tech Mono';font-size:13px;line-height:1.8;">
          Your 180-day journey begins now.<br>Track every day. Earn XP. Level up.<br>Never miss a day.
        </div>
        <button class="start-day-btn" onclick="startJourney()">⚡ BEGIN JOURNEY — DAY 1</button>
      </div>`;
    return;
  }

  const dayNum = state.currentDay;
  if (dayNum > 180) {
    container.innerHTML = `<div style="text-align:center;padding:40px;font-family:'Orbitron',monospace;font-size:18px;color:var(--gold);">🏆 JOURNEY COMPLETE!<br><br><span style="font-size:14px;color:var(--text2);">All 180 days finished. National Rank achieved.</span></div>`;
    return;
  }

  const dayData = SCHEDULE[dayNum-1];
  const completed = state.completedDays[dayNum];
  const isCompleted = completed && !completed.missed && completed.modes && allTasksDone(completed.modes);

  // init pending modes
  if (!pendingModes[dayNum]) {
    pendingModes[dayNum] = completed && completed.modes ? [...completed.modes] : [null,null,null,null];
  }
  const modes = pendingModes[dayNum];

  // Calculate live XP from modes
  let xpEarned = modes.reduce((sum, m, i) => {
    if (!m) return sum;
    const xp = calcTaskXp(dayData, i, m);
    return sum + (xp < 0 ? 0 : xp); // don't show penalty in preview, applied at complete
  }, 0);

  const done = allTasksDone(modes);
  const perfect = isPerfectDay(modes);
  const hasCopied = modes.some(m => m === 'copied');
  const maxPossible = 80 + PERFECT_BONUS + TRACKER_XP;

  const typeLabels = dayData.isRevision
    ? ['REVISION','REVISION','REVISION','REVISION']
    : ['LEARN','EASY','EASY','MEDIUM'];

  let html = `<div class="day-card ${isCompleted?'completed':''} ${!isCompleted?'today':''} ${dayData.isRevision?'revision':''}">
    <div class="day-header">
      <div class="day-num">DAY ${dayNum}</div>
      <div class="day-focus">${dayData.focus}</div>
      <div class="day-xp-preview" id="liveXp">${xpEarned}/${maxPossible} XP</div>
    </div>`;

  // Integrity legend
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">`;
  ['solo','hint','ai','copied'].forEach(k => {
    const ig = INTEGRITY[k];
    html += `<div style="font-family:'Share Tech Mono';font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid;border-color:${ig.color}33;color:${ig.color};">${ig.badge} — ${ig.desc}</div>`;
  });
  html += `</div>`;

  html += `<div class="tasks">`;

  dayData.tasks.forEach((task, i) => {
    const mode = modes[i];
    const base = getBaseXp(dayData, i);
    const earnedXp = mode ? calcTaskXp(dayData, i, mode) : base;
    const ig = mode ? INTEGRITY[mode] : null;
    const rowCls = mode ? `task-row ${mode}` : 'task-row';

    html += `<div class="${rowCls}">
      <div class="task-top">
        <div style="font-family:'Share Tech Mono';font-size:10px;color:var(--text3);min-width:52px;">[${typeLabels[i]}]</div>
        <div class="task-label">${task}</div>
        <div class="task-xp" style="color:${mode?(mode==='copied'?'var(--red)':ig.color):'var(--text3)'};">
          ${mode ? (earnedXp >= 0 ? '+'+earnedXp : earnedXp) + ' XP' : '+'+base+' XP'}
        </div>
        ${mode ? `<div class="task-type-badge" style="border-color:${ig.color};color:${ig.color};">${ig.badge}</div>` : ''}
      </div>`;

    if (!isCompleted) {
      html += `<div class="integrity-row">
        <button class="integrity-btn ${mode==='solo'?'active-solo':''}" onclick="setMode(${dayNum},${i},'solo')">✓ SOLO<br><span style="font-size:9px;">+${base} XP</span></button>
        <button class="integrity-btn ${mode==='hint'?'active-hint':''}" onclick="setMode(${dayNum},${i},'hint')">~ HINT<br><span style="font-size:9px;">+${Math.round(base*0.5)} XP</span></button>
        <button class="integrity-btn ${mode==='ai'?'active-ai':''}" onclick="setMode(${dayNum},${i},'ai')">! AI HELP<br><span style="font-size:9px;">+${Math.round(base*0.33)} XP</span></button>
        <button class="integrity-btn ${mode==='copied'?'active-copied':''}" onclick="setMode(${dayNum},${i},'copied')">✗ COPIED<br><span style="font-size:9px;">-30 XP</span></button>
      </div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;

  // Tracker row
  const trackerDone = completed && completed.trackerUpdated;
  html += `<div class="task-row ${trackerDone?'solo':''}" onclick="${isCompleted?'':'toggleTracker('+dayNum+')'}" style="margin-top:8px;cursor:${isCompleted?'default':'pointer'}">
    <div class="task-top">
      <div style="font-family:'Share Tech Mono';font-size:10px;color:var(--text3);min-width:52px;">[TRACKER]</div>
      <div class="task-label">Update tracker / take notes</div>
      <div class="task-xp" style="color:${trackerDone?'var(--green)':'var(--text3)'};">${trackerDone?'✓ +10':'○ +10'} XP</div>
    </div>
  </div>`;

  // Bonus / penalty notices
  if (done && !isCompleted) {
    if (perfect) {
      html += `<div style="margin-top:10px;padding:8px 12px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:6px;font-family:'Share Tech Mono';font-size:12px;color:var(--gold);">⚡ ALL SOLO — PERFECT DAY BONUS: +40 XP</div>`;
    }
    if (hasCopied) {
      html += `<div style="margin-top:8px;padding:8px 12px;background:rgba(255,59,92,0.06);border:1px solid rgba(255,59,92,0.2);border-radius:6px;font-family:'Share Tech Mono';font-size:12px;color:var(--red);">⚠️ CHEATING PENALTY WILL APPLY: -30 XP per copied problem</div>`;
    }
  }

  if (!isCompleted) {
    const btnLabel = done
      ? (perfect ? '⚡ SUBMIT — PERFECT DAY (+40 BONUS)' : '⚡ SUBMIT DAY')
      : 'SELECT YOUR INTEGRITY FOR EACH TASK FIRST';
    html += `<button class="complete-day-btn" onclick="${done?'completeDay('+dayNum+')':''}" style="${done?'':'opacity:0.4;cursor:not-allowed;'}">${btnLabel}</button>`;
  } else {
    const savedXp = completed.xp || 0;
    html += `<button class="complete-day-btn done-btn">✓ DAY ${dayNum} COMPLETE — ${savedXp} XP EARNED</button>`;
  }

  html += `</div>`;

  // Next day preview
  if (isCompleted && dayNum < 180) {
    const nextData = SCHEDULE[dayNum];
    html += `<div style="margin-top:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
      <div style="font-family:'Share Tech Mono';font-size:11px;color:var(--text2);margin-bottom:8px;">NEXT: DAY ${dayNum+1}</div>
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${nextData.focus}</div>
      <div style="font-size:12px;color:var(--text2);">${nextData.tasks[0]}</div>
      <button class="complete-day-btn" onclick="advanceToNextDay()" style="margin-top:12px;">▶ ADVANCE TO DAY ${dayNum+1}</button>
    </div>`;
  }

  container.innerHTML = html;
}

function startJourney() {
  state.startDate = todayStr();
  state.lastActivityDate = todayStr();
  saveState(state);
  showToast('⚡ JOURNEY STARTED! DAY 1 BEGINS!', 'success');
  renderToday();
}

function setMode(dayNum, taskIdx, mode) {
  const completed = state.completedDays[dayNum];
  if (completed && completed.modes && allTasksDone(completed.modes)) return;

  if (!pendingModes[dayNum]) pendingModes[dayNum] = [null,null,null,null];

  // toggle off if same button clicked again
  if (pendingModes[dayNum][taskIdx] === mode) {
    pendingModes[dayNum][taskIdx] = null;
  } else {
    pendingModes[dayNum][taskIdx] = mode;
    const dayData = SCHEDULE[dayNum-1];
    const xp = calcTaskXp(dayData, taskIdx, mode);
    const ig = INTEGRITY[mode];
    if (mode === 'copied') {
      showToast(`✗ COPIED — -30 XP PENALTY AT SUBMIT`, 'danger');
    } else {
      showToast(`${ig.badge} — +${xp} XP`, mode === 'solo' ? 'success' : mode === 'hint' ? 'xp' : 'xp');
    }
  }
  renderToday();
}

function toggleTracker(dayNum) {
  if (!state.completedDays[dayNum]) state.completedDays[dayNum] = {modes:[null,null,null,null],xp:0,date:null,trackerUpdated:false};
  state.completedDays[dayNum].trackerUpdated = !state.completedDays[dayNum].trackerUpdated;
  if (state.completedDays[dayNum].trackerUpdated) {
    state.xp += 10;
    showToast('+10 XP — TRACKER UPDATED!', 'xp');
  } else {
    state.xp = Math.max(0, state.xp - 10);
  }
  saveState(state);
  updateStats();
  renderToday();
}

function completeDay(dayNum) {
  const modes = pendingModes[dayNum];
  if (!modes || !allTasksDone(modes)) {
    showToast('SELECT INTEGRITY FOR ALL TASKS!', 'danger');
    return;
  }

  const dayData = SCHEDULE[dayNum-1];
  let xpGained = 0;
  let copiedCount = 0;

  modes.forEach((m, i) => {
    const xp = calcTaskXp(dayData, i, m);
    if (m === 'copied') {
      copiedCount++;
      xpGained += xp; // negative
    } else {
      xpGained += xp;
    }
  });

  // Perfect day bonus only if ALL solo
  const perfect = isPerfectDay(modes);
  if (perfect) xpGained += PERFECT_BONUS;

  // Tracker bonus (already applied separately)
  const trackerDone = state.completedDays[dayNum] && state.completedDays[dayNum].trackerUpdated;

  // Clamp total XP gained (can't go negative from a single day)
  xpGained = Math.max(0, xpGained);

  state.completedDays[dayNum] = {
    modes: [...modes],
    xp: xpGained,
    date: todayStr(),
    trackerUpdated: trackerDone || false
  };

  state.xp = Math.max(0, state.xp + xpGained);
  state.streak++;
  if (state.streak > state.maxStreak) state.maxStreak = state.streak;
  state.lastActivityDate = todayStr();

  const rewardCheck = REWARDS.find(r => r.streak === state.streak);
  if (rewardCheck) showToast(`🏆 STREAK REWARD UNLOCKED: ${rewardCheck.title}!`, 'success');

  saveState(state);
  updateStats();
  renderToday();
  renderSchedule();

  if (perfect) {
    showToast(`+${xpGained} XP — PERFECT DAY! ALL SOLO!`, 'success');
  } else if (copiedCount > 0) {
    showToast(`DAY DONE — ${copiedCount} CHEATING PENALTY(S) APPLIED`, 'danger');
  } else {
    showToast(`+${xpGained} XP — DAY ${dayNum} COMPLETE!`, 'xp');
  }
}

function advanceToNextDay() {
  if (state.currentDay < 180) {
    state.currentDay++;
    pendingModes[state.currentDay] = [null,null,null,null];
    saveState(state);
    renderToday();
    updateStats();
  }
}

// ========== SCHEDULE TAB ==========

function renderSchedule() {
  const grid = document.getElementById('scheduleGrid');
  let html = '';
  SCHEDULE.forEach(d => {
    const comp = state.completedDays[d.day];
    const isToday = d.day === state.currentDay && state.startDate;
    const isMissed = comp && comp.missed;
    const isDone = comp && !isMissed && comp.modes && allTasksDone(comp.modes);
    const isRev = d.isRevision;

    let cls = 'mini-day';
    let status = '';
    if (isDone) { cls += ' done-mini'; status = '✓ DONE'; }
    else if (isToday) { cls += ' today-mini'; status = '▶ TODAY'; }
    else if (isMissed) { cls += ' missed-mini'; status = '✗ MISSED'; }
    else if (isRev) { cls += ' rev-mini'; }

    html += `<div class="${cls}" onclick="jumpToDay(${d.day})">
      <div class="mini-day-num">DAY ${d.day}</div>
      <div class="mini-day-focus">${d.focus}</div>
      <div class="mini-day-status">${status}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

function jumpToDay(dayNum) {
  switchTab('today');
  // For simplicity, just show a note — full day jumping would need more logic
  if (dayNum === state.currentDay) return;
  // could implement day viewing here
}

// ========== REWARDS TAB ==========

function renderRewards() {
  const grid = document.getElementById('rewardsGrid');
  let html = '';
  REWARDS.forEach(r => {
    const unlocked = state.maxStreak >= r.streak || state.streak >= r.streak;
    html += `<div class="reward-card ${unlocked?'unlocked':''}">
      <div class="reward-status">${unlocked?'UNLOCKED':'LOCKED'}</div>
      <div class="reward-icon">${r.icon}</div>
      <div class="reward-title">${r.title}</div>
      <div class="reward-req">${r.streak}-day streak</div>
      <div style="margin-top:6px;font-size:13px;color:var(--text2);">${r.desc}</div>
    </div>`;
  });
  document.getElementById('rewardsGrid').innerHTML = html;

  // Special missions
  const specials = [
    {title:'Hard Problem First Try', xp:'+80 XP', icon:'⚔️'},
    {title:'Help Someone Learn DSA', xp:'+40 XP', icon:'🤝'},
    {title:'Solve 5 Problems in One Day', xp:'+120 XP', icon:'💥'},
    {title:'Sunday Boss Fight — Win Timed Contest', xp:'+100 XP', icon:'👑'},
    {title:'Lie in Tracker', xp:'-100 XP', icon:'💀', neg:true},
    {title:'Copy Solution Without Trying', xp:'-30 XP', icon:'🚫', neg:true}
  ];

  let sh = '';
  specials.forEach(s => {
    sh += `<div class="rule-group" style="${s.neg?'border-color:rgba(255,59,92,0.2)':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">${s.icon}</span>
          <span style="font-size:14px;">${s.title}</span>
        </div>
        <span style="font-family:'Share Tech Mono';font-size:14px;font-weight:700;color:${s.neg?'var(--red)':'var(--gold)'};">${s.xp}</span>
      </div>
    </div>`;
  });
  document.getElementById('specialMissions').innerHTML = sh;
}

// ========== RULES TAB ==========

function renderRules() {
  const rules = [
    {group:'DAILY XP', color:'var(--accent)', rows:[
      {label:'Learn today\'s topic', xp:'+20 XP', type:'pos'},
      {label:'Solve Easy Problem 1', xp:'+15 XP', type:'pos'},
      {label:'Solve Easy Problem 2', xp:'+15 XP', type:'pos'},
      {label:'Solve Medium Problem', xp:'+30 XP', type:'pos'},
      {label:'Revise yesterday\'s concept', xp:'+20 XP', type:'pos'},
      {label:'Update tracker', xp:'+10 XP', type:'pos'},
      {label:'Perfect Day Bonus (all complete)', xp:'+40 XP', type:'bonus'},
      {label:'Total per Perfect Day', xp:'150 XP', type:'bonus'}
    ]},
    {group:'PUNISHMENT', color:'var(--red)', rows:[
      {label:'Miss 1 day', xp:'-10 XP', type:'neg'},
      {label:'Miss 2 consecutive days', xp:'-50 XP + 2 extra problems', type:'neg'},
      {label:'Miss 3+ days', xp:'-80 XP + 24hr no entertainment', type:'neg'},
      {label:'Fail weekly quest', xp:'5 extra revision problems', type:'neg'},
      {label:'Copy solution without trying', xp:'-30 XP', type:'neg'},
      {label:'Lying in tracker', xp:'-100 XP', type:'neg'}
    ]},
    {group:'RANKS', color:'var(--gold)', isRank:true}
  ];

  let html = '';
  rules.forEach(g => {
    html += `<div class="rule-group" style="border-color:${g.color}22">
      <div class="rule-group-title" style="color:${g.color}">${g.group}</div>`;
    if (g.isRank) {
      html += `<table class="ranks-table"><tr><th>RANK</th><th>XP NEEDED</th><th>STATUS</th></tr>`;
      RANKS.forEach(r => {
        const current = state.xp >= r.min && (RANKS.indexOf(r) === RANKS.length-1 || state.xp < RANKS[RANKS.indexOf(r)+1].min);
        html += `<tr style="${current?'background:rgba(255,215,0,0.06)':''}">
          <td style="font-family:'Orbitron',monospace;color:${r.color};font-weight:700;">${r.name}</td>
          <td style="font-family:'Share Tech Mono';">${r.min.toLocaleString()} XP</td>
          <td style="font-size:12px;color:${current?'var(--gold)':'var(--text3)'};">${current?'◀ YOU ARE HERE':state.xp>=r.min?'✓ REACHED':''}</td>
        </tr>`;
      });
      html += '</table>';
    } else {
      g.rows.forEach(row => {
        html += `<div class="rule-row">
          <span>${row.label}</span>
          <span class="rule-xp ${row.type}">${row.xp}</span>
        </div>`;
      });
    }
    html += '</div>';
  });

  document.getElementById('rulesContent').innerHTML = html;
}

// ========== TABS ==========

function switchTab(name) {
  document.querySelectorAll('.day-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const tabs = ['today','schedule','rewards','rules'];
  const i = tabs.indexOf(name);
  document.querySelectorAll('.tab')[i].classList.add('active');

  if (name === 'schedule') renderSchedule();
  if (name === 'rewards') renderRewards();
  if (name === 'rules') renderRules();
}

// ========== TOAST ==========

function showToast(msg, type='xp') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}-toast`;
  setTimeout(() => { t.classList.remove('show'); }, 3000);
}

// ========== MODAL ==========

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

// ========== INIT ==========

function init() {
  checkMissedDays();
  updateStats();
  renderToday();
}

init();
</script>
